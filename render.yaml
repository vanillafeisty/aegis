services:
  - type: web
    name: aegis-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aegis-redis
          property: connectionString
      - key: CHROMA_HOST
        value: aegis-chromadb
      - key: CHROMA_PORT
        value: "8000"
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: sonalardhi@gmail.com
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: aegis-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    region: oregon
    envVars:
      - key: VITE_API_URL
        value: https://aegis-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://aegis-backend.onrender.com
    autoDeploy: true

  - type: worker
    name: aegis-celery-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    startCommand: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aegis-redis
          property: connectionString
      - key: CHROMA_HOST
        value: aegis-chromadb
      - key: CHROMA_PORT
        value: "8000"
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
    autoDeploy: true

  - type: worker
    name: aegis-celery-beat
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    startCommand: celery -A app.worker.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aegis-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
    autoDeploy: true

  - type: pserv
    name: aegis-chromadb
    env: docker
    dockerfilePath: ./infrastructure/docker/chromadb.Dockerfile
    plan: starter
    region: oregon
    autoDeploy: true

databases:
  - name: aegis-db
    plan: starter
    region: oregon

services:
  - type: redis
    name: aegis-redis
    plan: starter
    region: oregon
    autoDeploy: true